<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI TRADING DASHBOARD</title>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

.card {
    background:#1e293b;
    margin:10px;
    padding:15px;
    border-radius:12px;
}

button {
    padding:12px;
    margin:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.green { background:#22c55e; color:white; }
.red { background:#ef4444; color:white; }
.blue { background:#3b82f6; color:white; }

.hidden { display:none; }
</style>
</head>

<body>

<h2>🤖 AI TRADING DASHBOARD</h2>

<!-- STEP 1 -->
<div id="step1" class="card">
    <h3>🚀 Démarrer analyse</h3>
    <button class="blue" onclick="step2()">START</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="card hidden">
    <h3>💎 Choisir marché</h3>
    <button onclick="setMarket('EUR/USD')">EUR/USD</button>
    <button onclick="setMarket('GBP/USD')">GBP/USD</button>
    <button onclick="setMarket('BTC/USD')">BTC/USD</button>
</div>

<!-- STEP 3 -->
<div id="step3" class="card hidden">
    <h3>⏱ Timeframe</h3>
    <button onclick="setTime('5s')">5s</button>
    <button onclick="setTime('15s')">15s</button>
    <button onclick="setTime('1m')">1m</button>
</div>

<!-- STEP 4 -->
<div id="step4" class="card hidden">
    <h3>📊 Analyse IA</h3>

    <p id="rsi">RSI: ...</p>
    <p id="momentum">Momentum: ...</p>
    <p id="confidence">Confidence: ...</p>

    <button class="blue" onclick="analyze()">ANALYSE</button>
</div>

<!-- STEP 5 -->
<div id="step5" class="card hidden">
    <h2 id="finalSignal">SIGNAL</h2>
</div>

<script>

let market = "";
let time = "";

// 1
function step2() {
    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
}

// 2
function setMarket(m) {
    market = m;
    document.getElementById("step3").classList.remove("hidden");
}

// 3
function setTime(t) {
    time = t;
    document.getElementById("step4").classList.remove("hidden");
}

// 4
async function analyze() {

    const res = await fetch("/api/analyze");
    const data = await res.json();

    document.getElementById("rsi").innerText = "RSI: " + data.rsi;
    document.getElementById("momentum").innerText = "Momentum: " + data.momentum;
    document.getElementById("confidence").innerText = "Confidence: " + data.confidence + "%";

    document.getElementById("step5").classList.remove("hidden");

    document.getElementById("finalSignal").innerText =
        data.emoji + " SIGNAL: " + data.signal;
}

</script>

</body>
</html>
