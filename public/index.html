<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Trading Bot</title>

  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0b1220; color:white; }

    .header {
      background:#111827;
      padding:15px;
      text-align:center;
      font-weight:bold;
    }

    #chart {
      height:400px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      padding:10px;
    }

    .box {
      background:#1f2937;
      padding:10px;
      border-radius:10px;
    }

    input, button {
      width:100%;
      padding:6px;
      margin-top:5px;
      border:none;
      border-radius:8px;
    }

    button {
      cursor:pointer;
      color:white;
    }

    .login { background:#3b82f6; }
    .admin { background:#f59e0b; }
  </style>
</head>

<body>

<div class="header">
🚀 AI TRADING BOT DASHBOARD
</div>

<!-- 📊 CHART -->
<div id="chart"></div>

<div class="grid">

  <!-- 📊 SIGNAL -->
  <div class="box">
    <h3>📊 Signal IA</h3>
    <p id="signal">Loading...</p>
    <p id="confidence"></p>
  </div>

  <!-- 🧠 STRATEGY -->
  <div class="box">
    <h3>🧠 Strategy</h3>
    <p id="strategy">Loading...</p>
  </div>

  <!-- 👨‍💼 ADMIN -->
  <div class="box">
    <h3>👨‍💼 Admin Panel</h3>

    <p id="adminMsg">Loading...</p>

    <input id="msg" placeholder="Admin message">
    <button class="admin" onclick="updateAdmin()">Update</button>
  </div>

</div>

<!-- 🔐 LOGIN -->
<div class="box" style="margin:10px;">
  <h3>🔐 Admin Login</h3>
  <input id="pass" type="password" placeholder="Password">
  <button class="login" onclick="login()">Login</button>
</div>

<script>

const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout:{ background:{ color:'#0b1220' }, textColor:'white' },
  grid:{ vertLines:{ color:'#222' }, horzLines:{ color:'#222' } }
});

const candleSeries = chart.addCandlestickSeries();

let symbol = "BTCUSDT";

/* =========================
   📊 LOAD CHART
========================= */
async function loadChart(){
  const res = await fetch("https://api.binance.com/api/v3/klines?symbol="+symbol+"&interval=1m&limit=100");
  const data = await res.json();

  candleSeries.setData(data.map(c=>({
    time:c[0]/1000,
    open:+c[1],
    high:+c[2],
    low:+c[3],
    close:+c[4]
  })));
}

loadChart();

/* =========================
   🔥 LIVE + SIGNAL
========================= */
setInterval(async ()=>{

  const res = await fetch("https://api.binance.com/api/v3/klines?symbol="+symbol+"&interval=1m&limit=1");
  const data = await res.json();
  const c = data[0];

  candleSeries.update({
    time:c[0]/1000,
    open:+c[1],
    high:+c[2],
    low:+c[3],
    close:+c[4]
  });

  const sig = await fetch("/api/signal");
  const s = await sig.json();

  document.getElementById("signal").innerText = s.signal;
  document.getElementById("strategy").innerText = s.strategy;
  document.getElementById("confidence").innerText = "Confidence: "+s.confidence+"%";

},2000);

/* =========================
   🔐 LOGIN
========================= */
async function login(){
  const password = document.getElementById("pass").value;

  const res = await fetch("/api/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password})
  });

  alert(res.ok ? "Login OK" : "Wrong password");
}

/* =========================
   👨‍💼 ADMIN
========================= */
async function loadAdmin(){
  const res = await fetch("/api/admin-message");
  const data = await res.json();
  document.getElementById("adminMsg").innerText = data.message;
}

loadAdmin();

async function updateAdmin(){
  const msg = document.getElementById("msg").value;

  await fetch("/api/admin-message",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  loadAdmin();
}

</script>

</body>
</html>
