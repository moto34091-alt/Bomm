<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trading Mini App</title>

<style>
body {
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:20px;
}

.card {
    background:#1e293b;
    margin:10px;
    padding:15px;
    border-radius:12px;
}

button {
    padding:12px;
    border:none;
    border-radius:10px;
    margin:5px;
    cursor:pointer;
}

.green { background:#22c55e; color:white; }
.red { background:#ef4444; color:white; }
.blue { background:#3b82f6; color:white; }
</style>
</head>

<body>

<h2>📊 AI TRADING MINI APP</h2>

<div class="card">
    <h3>💎 Marché</h3>
    <button onclick="market('EUR/USD')">EUR/USD</button>
    <button onclick="market('BTC/USD')">BTC/USD</button>
</div>

<div class="card">
    <h3>⏱ Timeframe</h3>
    <button onclick="time('5s')">5s</button>
    <button onclick="time('1m')">1m</button>
</div>

<div class="card">
    <button class="blue" onclick="analyze()">🔍 ANALYSER</button>
</div>

<div class="card">
    <h2 id="signal">SIGNAL: ...</h2>
    <p id="rsi">RSI: ...</p>
    <p id="momentum">Momentum: ...</p>
</div>

<script>

let m = "";
let t = "";

function market(x){ m = x; }
function time(x){ t = x; }

async function analyze(){

    const res = await fetch("/api/signal");
    const data = await res.json();

    document.getElementById("signal").innerText =
        data.emoji + " " + data.signal;

    document.getElementById("rsi").innerText =
        "RSI: " + data.rsi;

    document.getElementById("momentum").innerText =
        "Momentum: " + data.momentum;
}

</script>

</body>
</html>
